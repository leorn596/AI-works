<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Git Push 流程图</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font:
      14px/1.4 ui-sans-serif,
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
  }
  main {
    max-width: 780px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title {
    font-size: 20px;
    font-weight: 650;
    fill: var(--fg);
  }
  .label {
    font-size: 14px;
    font-weight: 600;
    fill: var(--fg);
  }
  .small {
    font-size: 12px;
    fill: var(--muted);
  }
  .node {
    stroke: var(--line);
    stroke-width: 1;
    rx: 6;
    ry: 6;
  }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge {
    stroke: var(--line);
    stroke-width: 1.5;
    fill: none;
  }
  .zone {
    fill: none;
    stroke: var(--line);
    stroke-width: 1;
    stroke-dasharray: 6 5;
    opacity: 0.8;
  }
</style>
<main>
<svg viewBox="0 0 720 880" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--line)" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" class="title">Git Push 流程</text>

  <!-- Zone: 本机 -->
  <rect x="60" y="56" width="600" height="370" class="zone" rx="8" ry="8" />
  <text x="80" y="80" class="small">本机 (leorn / CentOS)</text>

  <!-- Zone: GitHub -->
  <rect x="60" y="440" width="600" height="130" class="zone" rx="8" ry="8" />
  <text x="80" y="464" class="small">GitHub</text>

  <!-- Zone: 用户 -->
  <rect x="60" y="584" width="600" height="100" class="zone" rx="8" ry="8" />
  <text x="80" y="608" class="small">用户</text>

  <!-- Step 1: 修改文件 -->
  <rect x="240" y="100" width="240" height="44" class="node input" />
  <text x="360" y="126" text-anchor="middle" class="label">✏️ 修改文件</text>
  <text x="360" y="155" text-anchor="middle" class="small">SKILL.md / MEMORY.md / scripts</text>

  <!-- Step 2: git add -->
  <rect x="240" y="176" width="240" height="40" class="node process" />
  <text x="360" y="202" text-anchor="middle" class="label">📦 git add</text>

  <!-- Step 3: git commit -->
  <rect x="240" y="240" width="240" height="40" class="node process" />
  <text x="360" y="266" text-anchor="middle" class="label">📝 git commit -m "feat: ..."</text>

  <!-- Step 4: SSH 认证 -->
  <rect x="240" y="304" width="240" height="40" class="node risk" />
  <text x="360" y="330" text-anchor="middle" class="label">🔑 SSH 认证</text>

  <!-- Step 4 sub: 过程 -->
  <text x="360" y="360" text-anchor="middle" class="small">eval $(ssh-agent) → ssh-add → ssh -T git@github.com</text>

  <!-- Step 5: git push -->
  <rect x="240" y="384" width="240" height="40" class="node process" />
  <text x="360" y="410" text-anchor="middle" class="label">🚀 git push origin &lt;branch&gt;</text>

  <!-- GitHub: 接收 -->
  <rect x="240" y="474" width="240" height="40" class="node storage" />
  <text x="360" y="500" text-anchor="middle" class="label">💾 GitHub 接收推送</text>

  <text x="360" y="530" text-anchor="middle" class="small">创建/更新远程分支</text>

  <!-- Step 6: 通知用户 -->
  <rect x="240" y="618" width="240" height="40" class="node external" />
  <text x="360" y="644" text-anchor="middle" class="label">📢 告知用户推送结果</text>

  <!-- 条件判断 -->
  <polygon points="360,672 380,688 360,704 340,688" class="node neutral" />
  <text x="360" y="692" text-anchor="middle" class="small">?</text>

  <!-- 分支 -->
  <text x="560" y="690" text-anchor="start" class="small">切 main → merge</text>
  <text x="560" y="708" text-anchor="start" class="small">→ git push origin main</text>

  <rect x="240" y="730" width="240" height="40" class="node input" />
  <text x="360" y="756" text-anchor="middle" class="label">✅ 合并到 main 完成</text>

  <!-- Arrows -->
  <path d="M360 144 L360 176" class="edge" marker-end="url(#arrow)" />
  <path d="M360 216 L360 240" class="edge" marker-end="url(#arrow)" />
  <path d="M360 280 L360 304" class="edge" marker-end="url(#arrow)" />
  <path d="M360 344 L360 384" class="edge" marker-end="url(#arrow)" />
  <path d="M360 424 L360 474" class="edge" marker-end="url(#arrow)" />
  <path d="M360 514 L360 618" class="edge" marker-end="url(#arrow)" />
  <path d="M360 658 L360 688" class="edge" marker-end="url(#arrow)" />

  <!-- 合并分支线 -->
  <path d="M380 688 L520 688 L520 710 L480 710" class="edge" marker-end="url(#arrow)" />
  <path d="M340 688 L240 688 L240 750 L240 750" class="edge" marker-end="url(#arrow)" />
</svg>
<details style="margin-top:24px;background:var(--neutral);padding:12px 16px;border-radius:6px;color:var(--fg)">
<summary style="cursor:pointer;font-weight:600">📋 关键点说明</summary>
<ul style="margin-top:8px;">
  <li><strong>SSH 认证</strong>：用 <code>oc_user01</code> 的公钥认证 GitHub，agent 每次 push 前保证 ssh-agent 已加载 key</li>
  <li><strong>分支策略</strong>：新工作在 feature 分支开发 → 推送到 GitHub → 合并到 main</li>
  <li><strong>工作区映射</strong>：仓库在 <code>/root/.openclaw/workspace/robot01</code>，skill/nginx 配置也拷贝到仓库中</li>
  <li><strong>权限</strong>：SSH key 在 <code>oc_user01@~/.ssh/id_ed25519</code>，已同步到 root</li>
</ul>
</details>
</main>
