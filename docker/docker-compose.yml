# ============================================================
# AI Web 安全漏洞分析平台 — Docker Compose 配置
# Sprint 1: 前端 + 后端 + MySQL + Redis
# ============================================================

version: "3.9"

services:
  # ========================================
  # MySQL 8.x — 关系型数据库
  # ========================================
  db:
    image: mysql:8.0
    container_name: vuln-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vuln_platform}
      MYSQL_USER: ${MYSQL_USER:-vuln_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vuln_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vuln-network

  # ========================================
  # Redis 6.x — 缓存 / 队列
  # ========================================
  redis:
    image: redis:6-alpine
    container_name: vuln-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vuln-network

  # ========================================
  # FastAPI 后端
  # ========================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: vuln-backend
    restart: unless-stopped
    environment:
      # 数据库
      DB_URL: mysql+asyncmy://${MYSQL_USER:-vuln_user}:${MYSQL_PASSWORD:-vuln_pass}@db:3306/${MYSQL_DATABASE:-vuln_platform}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      # CORS — 生产环境应改为实际域名
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      # AI API (OpenAI 兼容接口，env 名对齐 config.py)
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # 环境标识
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vuln-network

  # ========================================
  # React 前端 (Nginx 反向代理)
  # ========================================
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: vuln-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - vuln-network

# ============================================
# 持久化卷
# ============================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# 自定义网络
# ============================================
networks:
  vuln-network:
    driver: bridge
