server {
    listen       8080;
    server_name  localhost;
    root         /usr/share/nginx/html;

    # Gallery page
    location /gallery/ {
        autoindex on;
    }

    # Images directory - long cache for static files
    location /gallery/images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Prevent access to nginx default files
    location / {
        return 301 /gallery/;
    }

    error_page 404 /gallery/;
}
